services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ui_classifier_app
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      # Montar modelos en tiempo real para no reconstruir si cambian
      - ./models:/app/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
